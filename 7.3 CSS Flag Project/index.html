<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    .flag{
      width:900px;
      height:600px;
      background-color: #CE1126;
      position: absolute;
    }
    .flag >div{
      height:300px;
      width:100%;
      background-color: #002868;
      position: absolute;
      top:150px;
    }

    .flag > div >div{
      width:200px;
      height:200px;
      border-radius: 50%;
      background-color: white;
      position: absolute;
      left:350px;
      top:50px;
    }

    p{
      font-size: 5rem;
      text-align: center;
      padding:0;
      margin:0;
    }
    .flag>div div p {
      color: black;
    }
  </style>
</head>


<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
